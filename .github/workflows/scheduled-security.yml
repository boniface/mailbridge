name: Scheduled Security

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  COMPREHENSIVE_FEATURES: hyvor-relay,api,rustls,queue-memory,rate-limit,smtp,telemetry,queue-sqlite,queue-postgres,queue-scylla,sendgrid,sendpulse,mailgun,dotenv,test-utils

jobs:
  audit-and-deny:
    name: Audit and Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --no-default-features --features ${{ env.COMPREHENSIVE_FEATURES }}
      - run: cargo audit --db target/advisory-db

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-semver-checks
      - name: Check public API compatibility
        run: |
          if curl -fsSL https://index.crates.io/ma/il/mailbridge >/dev/null; then
            cargo semver-checks check-release
          else
            echo "mailbridge is not published on crates.io yet; skipping semver baseline check."
          fi
